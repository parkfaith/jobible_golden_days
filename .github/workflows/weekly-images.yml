name: 주간 배경 이미지 자동 다운로드

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = 일요일 자정 (UTC)
    - cron: '0 0 * * 1'
    # 매주 목요일 오전 9시 (KST) = 수요일 자정 (UTC)
    - cron: '0 0 * * 3'
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 스크립트 의존성 설치
        working-directory: scripts
        run: npm ci

      - name: Unsplash 이미지 다운로드
        working-directory: scripts
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node download-images.mjs

      - name: 변경 사항 확인
        id: check-changes
        run: |
          if git diff --quiet client/public/images/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "변경 사항 없음"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "추가된 파일:"
            git diff --stat client/public/images/
          fi

      - name: 변경 사항 커밋 및 푸시
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/images/
          DATE=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          git commit -m "feat: 배경 이미지 자동 추가 ($DATE)"
          git push
